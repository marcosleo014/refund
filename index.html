<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refund | sistema de reembolso</title>
    <link rel="shortcut icon" href="assets/icon-logo.png" type="image/x-icon">
    <link rel="stylesheet" href="styles/global.css">

    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Open+Sans:wght@300..800&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>

</head>
<body>

    <header class="logo container">
        <h1>
            <img src="assets/icon-logo.svg" alt="">
            refund
        </h1>
    </header>

    <main class="container">

        <section class="request-section">

            <header class="request-header">
                <h2>
                    Solicitação de reembolso
                </h2>
                <p>
                    Informe os dados da despesa para solicitar reembolso. A despesa será analisada e reembolsada em até 30 dias.
                </p>
            </header>

            <form action="#">

                <div class="group-input">

                    <label class="title-container">
                        <span class="label">
                            TÍTULO DA DESPESA
                        </span>
                        <input type="text" name="title" id="title" placeholder="Insira uma descrição">
                    </label>

                    <label class="category-container">
                        <span class="label">
                            CATEGORIA
                        </span>
                        <select name="category" id="category">
                            <option value="" selected hidden>Selecionar</option>
                            <option value="food">Alimentação</option>
                            <option value="hosting">Hospedagem</option>
                            <option value="transport">Transporte</option>
                            <option value="services">Serviços</option>
                            <option value="others">Outros</option>
                        </select>
                    </label>

                    <label class="value-container">
                        <span class="label">
                            VALOR
                        </span>
                        <input type="text" name="value" id="value" placeholder="R$ 0,00">
                    </label>

                </div>

                <button type="subtmi" class="add-expense-btn">
                    Adicionar despesa
                </button>

            </form>

        </section>

        <section class="refund-request">
            <header class="refund-request-header">
                <div>
                    <h2>
                        Minhas solicitações
                    </h2>
                    <p class="count">
                        6 despesas
                    </p>
                </div>

                <p class="expense-total">
                    R$ <strong>1.420,57</strong>
                </p>
            </header>

            <ul class="refund-list">
            </ul>

        </section>

    </main>

    <aside class="toast-notification toast-off" role="status">
        <img src="assets/warning.svg" alt="ícone de alerta">
        <p class="msg-toast">Item removido com sucesso</p>
        <button class="close-toast">
            <img src="assets/delete.svg" alt="ícone de fechar">
        </button>
    </aside>

</body>
</html>
